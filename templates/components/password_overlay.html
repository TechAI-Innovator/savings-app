<div id="password-overlay" class="fixed inset-0 z-50 flex items-center justify-center bg-background/95 backdrop-blur-sm animate-fade-in hidden-ui" style="background-color: hsla(0,0%,85%,0.95)">
  <div class="w-full max-w-md mx-4 p-8 rounded-3xl bg-gradient-to-br from-primary/10 via-white to-accent/10 border border-primary/20 shadow-2xl animate-scale-in">
    <div class="flex flex-col items-center gap-6">
      <div class="w-16 h-16 rounded-full bg-gradient-to-br from-primary to-primary/60 flex items-center justify-center shadow-lg">
        <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-primary-foreground"><rect width="18" height="11" x="3" y="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
      </div>
      <div class="text-center space-y-2">
        <h2 class="text-2xl font-bold text-foreground">Secure Access Required</h2>
        <p class="text-sm text-muted-foreground" style="color: hsl(var(--muted-foreground))">Please enter your password to access this application</p>
      </div>
      <form id="password-form" class="w-full space-y-4">
        <div class="space-y-2">
          <label for="password" class="text-foreground text-sm font-medium">Password</label>
          <input id="password" type="password" placeholder="Enter your password" required
            class="flex h-12 w-full rounded-md border border-primary/30 bg-white/50 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-primary/50" />
        </div>
        <div id="auth-error" class="hidden-ui flex items-start gap-2 p-3 rounded-lg border animate-fade-in" style="background: hsl(var(--destructive) / 0.1); border-color: hsl(var(--destructive) / 0.2);">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="text-destructive flex-shrink-0 mt-0.5" style="color: hsl(var(--destructive))"><circle cx="12" cy="12" r="10"/><line x1="12" x2="12" y1="8" y2="12"/><line x1="12" x2="12.01" y1="16" y2="16"/></svg>
          <p class="text-sm" style="color: hsl(var(--destructive))"></p>
        </div>
        <button type="submit" id="unlock-btn"
          class="w-full h-12 rounded-md bg-gradient-to-r from-primary to-primary/80 hover:from-primary/90 hover:to-primary/70 text-primary-foreground font-semibold shadow-lg transition-all inline-flex items-center justify-center">
          Unlock
        </button>
      </form>
      <p class="text-xs text-center" style="color: hsl(var(--muted-foreground))">For security reasons, you'll be logged out after 5 minutes of inactivity</p>
    </div>
  </div>
</div>
