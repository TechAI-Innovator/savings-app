{% extends "base.html" %}
{% block title %}Transaction History - Savings System{% endblock %}

{% block body %}
<div id="page-loading" class="min-h-screen bg-gradient-to-br from-blue-50 to-indigo-100 flex items-center justify-center">
  <div class="text-center">
    <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-indigo-600 mx-auto"></div>
    <p class="mt-4 text-gray-600">Checking authentication...</p>
  </div>
</div>

<div id="history-page" class="hidden-ui min-h-screen bg-gradient-to-br from-blue-50 to-indigo-100 p-3 sm:p-4 md:p-6 lg:px-40 lg:py-16 flex justify-center">
  <div class="w-full lg:max-w-[60%] bg-white rounded-2xl sm:rounded-3xl md:rounded-[80px] shadow-lg px-4 sm:px-6 md:px-8 pb-6 md:pb-8 pt-3 md:pt-4 min-h-[500px] border-4 md:border-[10px] border-blue-200">
    <div class="flex relative items-center sm:px-8 px-0 lg:px-12 h-[40px]">
      <div class="flex items-center gap-2">
        <p id="current-time" class="text-gray-600 text-body font-medium"></p>
      </div>
      <div class="absolute left-1/2 transform -translate-x-1/2 h-full flex items-center">
        <div class="h-full bg-blue-100 w-24 lg:w-32 flex items-center justify-center rounded-full"></div>
      </div>
      <div class="flex items-center gap-2 ml-auto">
        <svg class="w-5 h-4" viewBox="0 0 20 16" fill="currentColor"><rect x="0" y="12" width="3" height="4" rx="0.5"/><rect x="5" y="10" width="3" height="6" rx="0.5"/><rect x="10" y="8" width="3" height="8" rx="0.5"/><rect x="15" y="6" width="3" height="10" rx="0.5"/></svg>
        <svg class="w-5 h-5" viewBox="0 0 24 24" fill="currentColor"><path d="M1 9l2 2c4.97-4.97 13.03-4.97 18 0l2-2C16.93 2.93 7.08 2.93 1 9zm8 8l3 3 3-3c-1.65-1.66-4.34-1.66-6 0zm-4-4l2 2c2.76-2.76 7.24-2.76 10 0l2-2C15.14 9.14 8.87 9.14 5 13z"/></svg>
        <svg class="w-8 h-6" viewBox="0 0 24 12" fill="currentColor"><rect x="0" y="2" width="20" height="8" rx="1.5" fill="none" stroke="currentColor" stroke-width="1.5"/><rect x="2" y="3.5" width="16" height="5" rx="0.5"/><rect x="20" y="4.5" width="2" height="3" rx="0.5"/></svg>
      </div>
    </div>

    <button type="button" onclick="history.back()" class="flex items-center gap-2 text-gray-600 hover:text-gray-800 transition-colors mb-3 md:mb-4 mt-2 md:mt-6">
      <svg class="w-5 h-5 md:w-6 md:h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"/></svg>
      <span class="text-base md:text-lg font-medium">Back</span>
    </button>

    <h1 class="text-xl sm:text-2xl md:text-3xl font-bold text-gray-800 mb-4 md:mb-10" id="page-title">Transaction History</h1>

    <div id="error-panel" class="hidden-ui text-red-500 text-center py-8">
      <svg class="w-12 h-12 mx-auto mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
      <h2 class="text-xl font-semibold mb-2">Error Loading History</h2>
      <p class="text-gray-600" id="error-message"></p>
    </div>

    <div id="history-content" class="hidden-ui">
      <div class="mb-4 md:mb-6">
        <div class="flex flex-col sm:flex-row items-start sm:items-center justify-between gap-2 sm:gap-0 mb-3 md:mb-4">
          <h2 class="text-lg sm:text-xl md:text-2xl font-bold text-gray-800">General Summary</h2>
          <button type="button" id="toggle-balances" class="flex items-center gap-2 px-3 md:px-4 py-1.5 md:py-2 rounded-full bg-gray-100 hover:bg-gray-200 transition-colors text-sm">
            <span id="toggle-icon-show" class="flex items-center gap-1">
              <svg class="w-4 h-4 md:w-5 md:h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21"/></svg>
              <span class="text-xs md:text-sm font-medium">Show</span>
            </span>
            <span id="toggle-icon-hide" class="hidden-ui flex items-center gap-1">
              <svg class="w-4 h-4 md:w-5 md:h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/></svg>
              <span class="text-xs md:text-sm font-medium">Hide</span>
            </span>
          </button>
        </div>
        <div id="balances-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-3 md:gap-4"></div>
      </div>
      <div class="bg-white rounded-xl sm:rounded-2xl md:rounded-[54px] shadow-lg p-3 sm:p-4 md:p-6" id="transactions-container"></div>
    </div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>window.ACCOUNT_FILTER = {{ account_filter|tojson }};</script>
<script src="{{ url_for('static', filename='js/transaction-history.js') }}"></script>
{% endblock %}
