{% macro account_card(title, icon, gradient_from, gradient_to, shadow_color, delay) %}
<div class="account-card w-full max-w-[400px] min-w-[300px] h-[222px] px-6 rounded-[24px] flex flex-col gap-8 justify-center transition-transform duration-300 hover:scale-95 opacity-0"
  data-account="{{ title }}"
  style="background: linear-gradient(135deg, {{ gradient_from }}, {{ gradient_to }}); box-shadow: 0 -8px 24px -8px {{ shadow_color }}; animation: fade-in-up 1s ease-out {{ delay }} forwards;">
  <div class="flex items-center gap-1.5 opacity-0" style="animation: fade-in-up 0.8s ease-out calc({{ delay }} + 0.3s) forwards;">
    <div class="w-7 h-7 rounded-full bg-white/20 flex items-center justify-center overflow-hidden">
      <img src="{{ url_for('static', filename=icon) }}" alt="{{ title }}" class="w-full h-full object-cover" />
    </div>
    <h3 class="text-h3 text-foreground">{{ title }}</h3>
  </div>
  <div class="flex items-center justify-between gap-12 opacity-0" style="animation: fade-in-up 0.8s ease-out calc({{ delay }} + 0.5s) forwards;">
    <h2 class="text-h2 text-foreground balance-display" data-amount="0">₦ •••••</h2>
    <button type="button" class="toggle-balance w-9 h-9 rounded-full bg-primary/80 hover:bg-primary flex items-center justify-center flex-shrink-0 cursor-pointer transition-all"
      data-gradient-from="{{ gradient_from }}" aria-label="Toggle balance visibility">
      <span class="eye-hidden w-6 h-6 flex items-center justify-center">
        <div class="w-1 h-4 bg-foreground/80 rounded-full"></div>
      </span>
      <img src="{{ url_for('static', filename='icon/openmoji_eyes.svg') }}" alt="Hide balance" class="eye-visible w-6 h-6 hidden-ui" />
    </button>
  </div>
  <div class="flex gap-5 opacity-0" style="animation: fade-in-up 0.8s ease-out calc({{ delay }} + 0.7s) forwards;">
    <a href="{{ url_for('update_account_page') }}?source={{ title }}"
      class="flex-1 rounded-[10px] text-body bg-primary hover:bg-primary/70 text-primary-foreground inline-flex items-center justify-center h-10 px-4 py-2 text-sm font-medium transition-colors">Update</a>
    <a href="{{ url_for('transaction_history_page') }}?account={{ title }}"
      class="flex-1 rounded-[10px] text-body text-foreground inline-flex items-center justify-center h-10 px-4 py-2 text-sm font-medium transition-colors"
      style="background-color: hsl(250, 63%, 90%);">History</a>
  </div>
</div>
{% endmacro %}
